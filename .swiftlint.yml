disabled_rules:
  - function_body_length
  - type_body_length
  - file_length
  - generic_type_name
  - force_cast
  - force_try
  - identifier_name
  - type_name
  - todo
  - large_tuple
  - unused_setter_value
  - cyclomatic_complexity
  - weak_delegate
  - inclusive_language
  - class_delegate_protocol
  - nesting
  - function_parameter_count
  - notification_center_detachment
  - discarded_notification_center_observer
  - closure_parameter_position
  - statement_position
  - multiple_closures_with_trailing_closure
  - xctfail_message
  - compiler_protocol_init
  - reduce_boolean
  - legacy_cggeometry_functions
  - legacy_constructor
  - legacy_hashing
  - no_fallthrough_only

opt_in_rules:
  - file_header

file_header:
  required_pattern: |
                    \/\/
                    \/\/ Wire
                    \/\/ Copyright \(C\) 2023 Wire Swiss GmbH
                    \/\/
                    \/\/ This program is free software\: you can redistribute it and\/or modify
                    \/\/ it under the terms of the GNU General Public License as published by
                    \/\/ the Free Software Foundation\, either version 3 of the License\, or
                    \/\/ \(at your option\) any later version\.
                    \/\/
                    \/\/ This program is distributed in the hope that it will be useful,
                    \/\/ but WITHOUT ANY WARRANTY\; without even the implied warranty of
                    \/\/ MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE\. See the
                    \/\/ GNU General Public License for more details\.
                    \/\/
                    \/\/ You should have received a copy of the GNU General Public License
                    \/\/ along with this program. If not, see http\:\/\/www\.gnu\.org\/licenses\/\.
                    \/\/

excluded:
  - sourcery
  - fastlane
  - Carthage
  - DerivedData
  - vendor
  - wire-ios/Templates
  - "wire-ios/Wire-iOS/Generated/Assets+Generated.swift"
  - "wire-ios/Wire-iOS/Generated/Strings+Generated.swift"
  - "wire-ios-protos/Protos/messages.pb.swift"
  - "wire-ios-protos/Protos/mls.pb.swift"
  - "wire-ios-protos/Protos/otr.pb.swift"
  - "wire-ios-data-model/sourcery/generated/AutoMockable.generated.swift"
  - "wire-ios-sync-engine/sourcery/generated/AutoMockable.generated.swift"
  - "wire-ios-sync-engine/sourcery/generated/AutoMockable.manual.swift"
  - "wire-ios-request-strategy/sourcery/generated/AutoMockable.generated.swift"
  - "wire-ios/WireCommonComponents/Icons/Autogenerated/StyleKitIcons.generated.swift"

# In order to deal with the huge number of violations, first set
# very high limits then iteratively reduce the limits and resolve
# the few violations. Repeat this until we find suitable limits.

line_length:
  warning: 500
  error: 500

swiftlint_version: 0.53.0
